<!-- reset-password.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | Halo Marketplace</title>


<style>

* {
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body {

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f7fb;

}


.auth-card {

    width:420px;
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);

}


.logo {

    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;

}


.subtitle {

    text-align:center;
    color:#666;
    margin-bottom:25px;

}


input {

    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;

}



button {

    width:100%;
    padding:14px;
    background:#111827;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;

}



button:hover {

    opacity:.9;

}



.message {

    text-align:center;
    margin-top:15px;

}


.success {

    color:green;

}


.error {

    color:red;

}


</style>

</head>


<body>


<div class="auth-card">


<div class="logo">
Halo Marketplace
</div>


<div class="subtitle">
Create your new password
</div>




<input
id="password"
type="password"
placeholder="New password"
/>




<input
id="confirmPassword"
type="password"
placeholder="Confirm new password"
/>




<button onclick="updatePassword()">

Update Password

</button>




<div id="message" class="message"></div>


</div>




<script type="module">


import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";



const supabaseUrl =
"YOUR_SUPABASE_URL";


const supabaseKey =
"YOUR_SUPABASE_ANON_KEY";



const supabase =
createClient(

supabaseUrl,

supabaseKey

);





// Confirm recovery session exists

async function checkSession(){


const {

data,

error

} = await supabase.auth.getSession();



const message =
document.getElementById("message");



if(error || !data.session){


message.className =
"message error";


message.innerHTML =
"Invalid or expired reset link.";


}



}



checkSession();






window.updatePassword = async function(){



const password =
document.getElementById("password").value;



const confirmPassword =
document.getElementById("confirmPassword").value;



const message =
document.getElementById("message");





if(!password || !confirmPassword){


message.className =
"message error";


message.innerHTML =
"Please fill in both password fields.";


return;

}





if(password.length < 6){


message.className =
"message error";


message.innerHTML =
"Password must be at least 6 characters.";


return;

}





if(password !== confirmPassword){


message.className =
"message error";


message.innerHTML =
"Passwords do not match.";


return;

}





const {

error

} = await supabase.auth.updateUser({


password:password


});





if(error){


message.className =
"message error";


message.innerHTML =
error.message;


return;

}





message.className =
"message success";


message.innerHTML =
"Password updated successfully! Redirecting...";





setTimeout(()=>{


window.location.href =
"/login.html";


},2000);



}



</script>


</body>

</html>
