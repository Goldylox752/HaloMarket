<!-- login.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Halo Marketplace</title>


<style>

* {
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body {

    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f5f7fb;

}


.auth-card {

    width:400px;
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);

}


.logo {

    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;

}


.subtitle {

    text-align:center;
    color:#666;
    margin-bottom:25px;

}



input {

    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;

}



button {

    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#111827;
    color:white;
    font-size:16px;
    cursor:pointer;

}



button:hover {

    opacity:.9;

}



.links {

    text-align:center;
    margin-top:20px;

}


.links a {

    color:#2563eb;
    text-decoration:none;

}



.message {

    text-align:center;
    margin-top:15px;

}


.error {

    color:red;

}


.success {

    color:green;

}


</style>

</head>


<body>


<div class="auth-card">


<div class="logo">
Halo Marketplace
</div>


<div class="subtitle">
Login to your account
</div>




<input
id="email"
type="email"
placeholder="Email address"
/>




<input
id="password"
type="password"
placeholder="Password"
/>




<button onclick="login()">

Login

</button>




<div id="message" class="message"></div>




<div class="links">

<a href="/forgot-password.html">
Forgot password?
</a>

<br><br>

Don't have an account?

<a href="/register.html">
Create account
</a>


</div>


</div>




<script type="module">


import { createClient } 
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";



const supabaseUrl =
"YOUR_SUPABASE_URL";


const supabaseKey =
"YOUR_SUPABASE_ANON_KEY";



const supabase =
createClient(
supabaseUrl,
supabaseKey
);





window.login = async function(){



const email =
document.getElementById("email").value;


const password =
document.getElementById("password").value;



const message =
document.getElementById("message");



if(!email || !password){


message.className =
"message error";


message.innerHTML =
"Please enter email and password.";


return;

}




const {

data,

error

} = await supabase.auth.signInWithPassword({

email,

password

});





if(error){


message.className =
"message error";


message.innerHTML =
error.message;


return;


}





// Save user session

localStorage.setItem(

"halo_session",

JSON.stringify(data.session)

);




message.className =
"message success";


message.innerHTML =
"Login successful!";





// Get user profile

const {

data:profile

} = await supabase

.from("profiles")

.select("*")

.eq("id", data.user.id)

.single();





if(profile){


localStorage.setItem(

"halo_profile",

JSON.stringify(profile)

);



if(profile.role === "seller"){


window.location.href =
"/seller-dashboard.html";


}

else if(profile.role === "admin"){


window.location.href =
"/admin-dashboard.html";


}

else{


window.location.href =
"/buyer-dashboard.html";


}


}

else{


window.location.href =
"/dashboard.html";


}




}



</script>


</body>

</html>
