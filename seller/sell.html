<!-- seller/sell.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Create Listing | Halo Marketplace
</title>


<link rel="stylesheet" href="/assets/css/style.css">


</head>


<body>


<header class="header">

<div class="container nav">


<a href="/" class="logo">
Halo<span>.</span>
</a>


<a href="/seller/dashboard.html" class="btn">
Seller Dashboard
</a>


</div>

</header>





<main>


<section>

<div class="container">



<div class="seller-box">


<h1>
Create A Listing
</h1>


<p>
Sell your products across Canada with Halo Marketplace.
</p>



</div>






<div class="card listing-form">


<h2>
Product Information
</h2>




<form id="productForm">





<label>
Product Title
</label>


<input

id="title"

type="text"

placeholder="Example: iPhone 16 Pro"

required

>






<label>
Category
</label>


<select id="category" required>


<option value="">
Select Category
</option>


<option>
Electronics
</option>


<option>
Vehicles
</option>


<option>
Home
</option>


<option>
Fashion
</option>


<option>
Tools
</option>


<option>
Collectibles
</option>


</select>







<label>
Description
</label>


<textarea

id="description"

placeholder="Describe your product"

required

></textarea>







<div class="form-grid">


<div>

<label>
Price
</label>


<input

id="price"

type="number"

step="0.01"

required

>


</div>




<div>

<label>
Quantity
</label>


<input

id="quantity"

type="number"

value="1"

min="1"

required

>


</div>



</div>








<label>
Product Images
</label>


<input

id="image"

type="file"

accept="image/*"

multiple

required

>




<div id="preview" class="preview"></div>







<div class="verification">


<h3>
✅ Seller Protection
</h3>


<p>
Verified sellers receive better ranking and buyer trust.
</p>


</div>







<button

id="submitBtn"

type="submit"

class="btn"

>

Publish Listing

</button>





<p id="status"></p>




</form>




</div>




</div>


</section>


</main>







<script src="/assets/js/auth.js"></script>


<script>


requireSeller();




const API_URL =

"/api/v1";





const imageInput =

document.getElementById(
"image"
);



const preview =

document.getElementById(
"preview"
);






imageInput.addEventListener(

"change",

()=>{


preview.innerHTML="";



Array.from(imageInput.files)

.forEach(file=>{


const img =

document.createElement(
"img"
);



img.src =

URL.createObjectURL(file);



img.width=120;



img.style.borderRadius="15px";



preview.appendChild(img);



});


}

);








document

.getElementById(
"productForm"
)

.addEventListener(

"submit",

async(e)=>{


e.preventDefault();





const token =

localStorage.getItem(
"halo_token"
);






const formData =

new FormData();





formData.append(

"title",

document.getElementById(
"title"
).value

);





formData.append(

"category",

document.getElementById(
"category"
).value

);





formData.append(

"description",

document.getElementById(
"description"
).value

);





formData.append(

"price",

document.getElementById(
"price"
).value

);





formData.append(

"quantity",

document.getElementById(
"quantity"
).value

);







Array.from(

imageInput.files

)

.forEach(file=>{


formData.append(

"image",

file

);


});






const status =

document.getElementById(
"status"
);



const button =

document.getElementById(
"submitBtn"
);





try{


button.disabled=true;


button.innerHTML =
"Uploading...";





const response =

await fetch(

`${API_URL}/products`,

{


method:"POST",


headers:{


Authorization:

`Bearer ${token}`


},


body:formData


}

);





const data =

await response.json();







if(data.success){



status.innerHTML =

"✅ Listing published successfully!";



e.target.reset();



preview.innerHTML="";



}else{


status.innerHTML =

data.message ||

"Unable to create listing";


}



}


catch(error){



console.error(error);


status.innerHTML =
"Server error";


}



finally{


button.disabled=false;


button.innerHTML =
"Publish Listing";


}



});


</script>







<style>


.listing-form{

max-width:800px;

margin:40px auto;

}



label{

display:block;

font-weight:700;

margin:15px 0 8px;

}



input,
select,
textarea{

width:100%;

padding:14px;

border:1px solid #ddd;

border-radius:10px;

font-size:16px;

}



textarea{

height:150px;

}



.form-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}



.preview{

display:flex;

gap:15px;

margin:20px 0;

flex-wrap:wrap;

}



.verification{

background:#eff6ff;

padding:20px;

border-radius:15px;

margin:25px 0;

}



#status{

margin-top:15px;

font-weight:700;

}



@media(max-width:700px){

.form-grid{

grid-template-columns:1fr;

}

}


</style>


</body>

</html>
