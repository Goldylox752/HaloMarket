<!-- seller/sell.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Sell | Halo Marketplace
</title>


<link rel="stylesheet" href="/assets/css/style.css">


</head>


<body>



<header class="header">

<div class="container nav">


<a href="/" class="logo">
Halo<span>.</span>
</a>


<a href="/seller/dashboard.html" class="btn">
Seller Dashboard
</a>


</div>

</header>






<main>


<section>


<div class="container">



<div class="seller-box">



<div>


<h1>
Create A Listing
</h1>


<p>

Sell your products across Canada with Halo Marketplace.

</p>


</div>




</div>





<div class="card listing-form">



<h2>
Product Information
</h2>




<form id="productForm">





<label>
Product Title
</label>


<input

id="title"

type="text"

placeholder="Example: iPhone 16 Pro"

required

>





<label>
Category
</label>



<select id="category">


<option>
Electronics
</option>


<option>
Vehicles
</option>


<option>
Home
</option>


<option>
Fashion
</option>


<option>
Tools
</option>


<option>
Collectibles
</option>


</select>





<label>
Description
</label>



<textarea

id="description"

placeholder="Describe your product..."

></textarea>







<div class="form-grid">


<div>


<label>
Price
</label>


<input

id="price"

type="number"

placeholder="99.99"

required

>


</div>



<div>


<label>
Quantity
</label>


<input

id="quantity"

type="number"

placeholder="1"

required

>


</div>



</div>








<label>
Product Images
</label>



<input

id="image"

type="file"

accept="image/*"

multiple

>





<div class="preview" id="preview"></div>








<div class="verification">


<h3>
✅ Seller Protection
</h3>


<p>

Verified sellers receive higher visibility and buyer trust.

</p>


</div>







<button

type="submit"

class="btn"

>

Publish Listing

</button>




<p id="status"></p>




</form>




</div>



</div>


</section>


</main>






<script>


const imageInput =

document.getElementById(
"image"
);


const preview =

document.getElementById(
"preview"
);





imageInput.addEventListener(

"change",

()=>{


preview.innerHTML="";



[...imageInput.files].forEach(file=>{


const img =
document.createElement(
"img"
);


img.src =
URL.createObjectURL(file);


img.width=120;


img.style.borderRadius="15px";


preview.appendChild(img);



});


}

);







document

.getElementById(
"productForm"
)

.addEventListener(

"submit",

async(e)=>{


e.preventDefault();




const product = {


title:

document.getElementById(
"title"
).value,



category:

document.getElementById(
"category"
).value,



description:

document.getElementById(
"description"
).value,



price:

document.getElementById(
"price"
).value,



quantity:

document.getElementById(
"quantity"
).value



};






console.log(product);





/*

SUPABASE FLOW:


1. Upload images

storage bucket:

product-images



2. Insert product:


products table



POST:

/api/products/create



*/





document.getElementById(
"status"
).innerHTML =

"Listing created successfully!";




e.target.reset();



}

);


</script>





<style>


.listing-form{

max-width:800px;

margin:40px auto;

}



label{

display:block;

font-weight:700;

margin:15px 0 8px;

}



input,
select,
textarea{

width:100%;

padding:14px;

border:1px solid #ddd;

border-radius:10px;

font-size:16px;

}



textarea{

height:150px;

}



.form-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}



.preview{

display:flex;

gap:15px;

margin:20px 0;

flex-wrap:wrap;

}



.verification{

background:#eff6ff;

padding:20px;

border-radius:15px;

margin:25px 0;

}





@media(max-width:700px){

.form-grid{

grid-template-columns:1fr;

}

}


</style>



</body>

</html>
