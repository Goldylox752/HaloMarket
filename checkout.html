<!-- checkout.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | Halo Marketplace</title>


<style>

* {
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body {

    margin:0;
    background:#f5f7fb;

}


header {

    background:#111827;
    color:white;
    padding:25px;

}


.logo {

    font-size:28px;
    font-weight:bold;

}



.container {

    max-width:1100px;
    margin:auto;
    padding:40px 25px;

}



.checkout {

    display:grid;
    grid-template-columns:1fr 400px;
    gap:30px;

}



.card {

    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);

}



h1 {

    margin-bottom:25px;

}



input {

    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;

}



textarea {

    width:100%;
    height:120px;
    padding:14px;
    border:1px solid #ddd;
    border-radius:8px;

}



.product {

    display:flex;
    justify-content:space-between;
    margin-bottom:15px;

}



.total {

    font-size:24px;
    font-weight:bold;
    border-top:1px solid #ddd;
    padding-top:20px;

}



button {

    width:100%;
    padding:15px;
    background:#111827;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;

}



button:hover {

    opacity:.9;

}



.message {

    text-align:center;
    margin-top:15px;

}



@media(max-width:800px){

.checkout {

grid-template-columns:1fr;

}

}


</style>

</head>


<body>


<header>

<div class="logo">
Halo Marketplace
</div>

</header>



<div class="container">


<h1>
Checkout
</h1>




<div class="checkout">





<div class="card">


<h2>
Shipping Information
</h2>



<input
id="name"
placeholder="Full Name"
/>



<input
id="email"
placeholder="Email Address"
/>



<input
id="phone"
placeholder="Phone Number"
/>



<textarea
id="address"
placeholder="Shipping Address">
</textarea>



<h2>
Payment
</h2>


<p>
Secure payment powered by Stripe
</p>


<button onclick="checkout()">

Continue To Payment

</button>



<div id="message" class="message"></div>



</div>







<div class="card">


<h2>
Order Summary
</h2>




<div class="product">

<span>
Apple iPhone 15 Pro
</span>

<strong>
$999
</strong>

</div>




<div class="product">

<span>
Shipping
</span>

<strong>
$15
</strong>

</div>




<div class="product">

<span>
Tax
</span>

<strong>
$132
</strong>

</div>




<div class="total">

Total: $1,146

</div>



</div>






</div>


</div>






<script>


async function checkout(){


const message =
document.getElementById("message");



const customer = {


name:
document.getElementById("name").value,


email:
document.getElementById("email").value,


phone:
document.getElementById("phone").value,


address:
document.getElementById("address").value


};



if(!customer.name ||
!customer.email ||
!customer.address){


message.innerHTML =
"Please complete shipping information.";

return;

}





/*

Connect to backend:

POST /api/checkout

Backend creates:

Stripe Checkout Session

*/



message.innerHTML =
"Redirecting to secure payment...";




// Example:

// window.location.href = stripeCheckoutURL;



}



</script>


</body>

</html>
